<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bondvisor</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        background: #f8eee9;
        color: #222;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 420px;
        background: white;
        border-radius: 20px;
        padding: 28px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        text-align: center;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }
      p {
        color: #666;
        line-height: 1.5;
      }
      .code {
        margin: 20px 0;
        font-size: 32px;
        font-weight: 700;
        letter-spacing: 3px;
        color: #df7d5f;
      }
      .btn {
        display: block;
        width: 100%;
        box-sizing: border-box;
        text-decoration: none;
        background: #df7d5f;
        color: white;
        padding: 16px 20px;
        border-radius: 14px;
        font-weight: 700;
        margin-top: 12px;
      }
      .btn.secondary {
        background: #f3f3f3;
        color: #222;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Opening Bondvisor…</h1>
      <p>If the app doesn’t open automatically, use the button below.</p>
      <div id="inviteCode" class="code">------</div>
      <a id="openApp" class="btn" href="#">Open Bondvisor</a>
      <a id="openStore" class="btn secondary" href="https://apps.apple.com/" target="_blank" rel="noopener noreferrer">Download from App Store</a>
    </div>

    <script>
      const pathParts = window.location.pathname.split('/').filter(Boolean);
      const inviteCode = pathParts[1] || 'UNKNOWN';
      const appLink = `bondvisor://invite/${inviteCode}`;

      document.getElementById('inviteCode').textContent = inviteCode;
      document.getElementById('openApp').href = appLink;

      const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

      function tryOpenApp() {
        window.location.href = appLink;

        if (isIOS) {
          setTimeout(() => {
            window.location.href = "https://apps.apple.com/";
          }, 1800);
        }
      }

      window.addEventListener('load', () => {
        tryOpenApp();
      });
    </script>
  </body>
</html>
